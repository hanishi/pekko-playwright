pekko {
  loglevel = "DEBUG"
}

# Playwright Java's driver is single-threaded: every API call must run on
# the thread that called Playwright.create(). PinnedDispatcher gives each
# ResourceSession its own OS thread for its lifetime. allow-core-timeout=off
# keeps that thread alive (no 60s idle recycle that would move the actor to
# a fresh thread and crash the thread-affine Chromium handle).
session-pinned-dispatcher {
  type     = PinnedDispatcher
  executor = "thread-pool-executor"
  thread-pool-executor.allow-core-timeout = off
}

crawler {
  # Crawl target + shape. The seed URL (and optionally max-depth) can be
  # overridden as command-line args to crawler.Main; everything else comes
  # from here. target-elements are the CSS selectors whose text is scraped;
  # links found inside them that match `<domain>host-regex` are followed.
  seed-url        = "https://edition.cnn.com/sport"
  domain          = "edition.cnn.com"
  max-depth       = 3
  concurrency     = 5
  # Follow CNN dated-article links: /YYYY/MM/DD/...
  host-regex      = "\\/20\\d{2}\\/\\d{2}\\/\\d{2}\\/[^ ]*"
  target-elements = [
    "#maincontent",
    "body > div.layout-article-elevate__content-wrapper.layout__content-wrapper > section.layout__wrapper.layout-article-elevate__wrapper > section.layout__main.layout-article-elevate__main > section.layout__center.layout-article-elevate__center > article > section > main > div.article__content-container"
  ]
  # click-selector = "..."   # optional: click before scraping (cookie wall, etc.)
  cron-schedule   = "0 0 * * *"   # unused in one-shot mode; kept for completeness

  # Fixed number of pinned Chromium processes (browser pool size). Crawl
  # concurrency is an in-flight cap against this shared pool, not a browser
  # count — so total Chromium processes == this value regardless of load.
  browser-pool.size = 4
  useProxy = false // Set to true to enable proxy usage
  proxyProviders = [
    {
      provider = "Proxy Provider A"
      server = "http://geo.iproyal.com:12321"
      username = "your_username"
      password = "your_password"
    },
    {
      provider = "Proxy Provider B"
      server = "http://geo.iproyal.com:12321"
      username = "your_username"
      password = "your_password"
    }
  ]
}
