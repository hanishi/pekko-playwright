pekko {
  loglevel = "DEBUG"
}

# Playwright Java's driver is single-threaded: every API call must run on
# the thread that called Playwright.create(). PinnedDispatcher gives each
# ResourceSession its own OS thread for its lifetime. allow-core-timeout=off
# keeps that thread alive (no 60s idle recycle that would move the actor to
# a fresh thread and crash the thread-affine Chromium handle).
session-pinned-dispatcher {
  type     = PinnedDispatcher
  executor = "thread-pool-executor"
  thread-pool-executor.allow-core-timeout = off
}

crawler {
  # Crawl target + shape. Every scalar below has a sensible default and an
  # env-var override (CRAWLER_*), so the Docker image needs no rebuild to
  # retarget. seed-url/max-depth are also overridable as CLI args (which win).
  # target-elements are the CSS selectors whose text is scraped; links found
  # inside them that match `<domain>host-regex` are followed.
  seed-url        = "https://edition.cnn.com/sport"
  seed-url        = ${?CRAWLER_SEED_URL}
  domain          = "edition.cnn.com"
  domain          = ${?CRAWLER_DOMAIN}
  max-depth       = 3
  max-depth       = ${?CRAWLER_MAX_DEPTH}
  concurrency     = 5
  concurrency     = ${?CRAWLER_CONCURRENCY}
  # Regex a discovered link's path must match to be followed (JS RegExp,
  # appended after an optional same-domain prefix). Default: CNN dated
  # articles /YYYY/MM/DD/... Override per-run via the CRAWLER_HOST_REGEX env
  # var (note: env value is literal — single backslashes, no HOCON escaping).
  host-regex      = "\\/20\\d{2}\\/\\d{2}\\/\\d{2}\\/[^ ]*"
  host-regex      = ${?CRAWLER_HOST_REGEX}
  target-elements = [
    "#maincontent",
    "body > div.layout-article-elevate__content-wrapper.layout__content-wrapper > section.layout__wrapper.layout-article-elevate__wrapper > section.layout__main.layout-article-elevate__main > section.layout__center.layout-article-elevate__center > article > section > main > div.article__content-container"
  ]
  # Optional: click before scraping (cookie wall, "read more", etc.).
  # click-selector = "..."          # or set CRAWLER_CLICK_SELECTOR
  click-selector  = ${?CRAWLER_CLICK_SELECTOR}

  # Where the two-column (url,text) CSV is written. Overridable by the 3rd CLI
  # arg or the CRAWLER_OUTPUT env var (handy in Docker: point it at a volume).
  output-csv      = "crawler-output.csv"
  output-csv      = ${?CRAWLER_OUTPUT}

  # Fixed number of pinned Chromium processes (browser pool size). Crawl
  # concurrency is an in-flight cap against this shared pool, not a browser
  # count — so total Chromium processes == this value regardless of load.
  browser-pool.size = 4
  browser-pool.size = ${?CRAWLER_BROWSER_POOL_SIZE}
  useProxy = false // Set to true to enable proxy usage
  useProxy = ${?CRAWLER_USE_PROXY}
  proxyProviders = [
    {
      provider = "Proxy Provider A"
      server = "http://geo.iproyal.com:12321"
      username = "your_username"
      password = "your_password"
    },
    {
      provider = "Proxy Provider B"
      server = "http://geo.iproyal.com:12321"
      username = "your_username"
      password = "your_password"
    }
  ]
}
